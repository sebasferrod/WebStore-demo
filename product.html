<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Producto | GameStore</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="header">
  <a href="index.html" class="header-logo">🎮 GameStore</a>
  <div class="header-actions">
    <a href="index.html" class="btn btn-ghost">← Volver</a>
    <button class="cart-btn" onclick="toggleCart()" aria-label="Carrito">
      🛒
      <span class="cart-badge" id="cart-badge">0</span>
    </button>
  </div>
</header>

<main class="container" id="product-detail"></main>

<!-- Cart Panel -->
<div class="cart-overlay" id="cart-overlay" onclick="toggleCart()"></div>
<div class="cart-panel" id="cart-panel">
  <div class="cart-header">
    <h2 class="cart-title">Tu Carrito</h2>
    <button class="cart-close" onclick="toggleCart()">✕</button>
  </div>
  <div class="cart-items" id="cart-items"></div>
  <div class="cart-totals" id="cart-totals"></div>
  <a href="checkout.html" class="btn-checkout" id="btn-checkout" onclick="toggleCart()">Ir al checkout</a>
</div>

<script src="app.js"></script>
</body>
</html>
