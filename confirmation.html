<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confirmación | GameStore</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="header">
  <a href="index.html" class="header-logo">🎮 GameStore</a>
  <div class="header-actions">
    <a href="index.html" class="btn btn-ghost">Seguir comprando</a>
  </div>
</header>

<main class="container">
  <div class="confirmation-card">
    <div class="confirmation-icon">✅</div>
    <h1 class="confirmation-title">¡Pedido confirmado!</h1>
    <p class="confirmation-subtitle">Tu pedido fue registrado exitosamente</p>

    <div class="confirmation-code" id="confirmation-code">------</div>
    <p style="font-size:13px;color:var(--text-muted);margin-bottom:24px;">
      Guardá este código para retirar tu pedido
    </p>

    <div class="confirmation-details" id="confirmation-details"></div>

    <a href="index.html" class="btn btn-primary btn-lg">Volver al catálogo</a>
  </div>
</main>

<script src="app.js"></script>
</body>
</html>
