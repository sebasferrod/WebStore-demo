<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout | GameStore</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="header">
  <a href="index.html" class="header-logo">🎮 GameStore</a>
  <div class="header-actions">
    <a href="index.html" class="btn btn-ghost">← Volver al catálogo</a>
  </div>
</header>

<main class="container">
  <div class="page-header">
    <h1 class="page-title">Checkout</h1>
  </div>

  <div class="checkout-grid">
    <div>
      <!-- Contact -->
      <div class="checkout-section">
        <h2>1. Información de contacto</h2>
        <div class="form-group">
          <label for="email">Email *</label>
          <input type="email" id="email" class="form-control" placeholder="tu@email.com" required>
        </div>
      </div>

      <!-- Address -->
      <div class="checkout-section">
        <h2>2. Dirección de entrega</h2>
        <div class="form-row">
          <div class="form-group">
            <label for="street">Calle *</label>
            <input type="text" id="street" class="form-control" placeholder="Av. Corrientes" required>
          </div>
          <div class="form-group">
            <label for="number">Número *</label>
            <input type="text" id="number" class="form-control" placeholder="1234" required>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="floor">Piso</label>
            <input type="text" id="floor" class="form-control" placeholder="3">
          </div>
          <div class="form-group">
            <label for="apartment">Departamento</label>
            <input type="text" id="apartment" class="form-control" placeholder="B">
          </div>
        </div>
        <div class="form-group">
          <label for="neighborhood">Barrio *</label>
          <input type="text" id="neighborhood" class="form-control" placeholder="Palermo" required>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="city">Ciudad *</label>
            <select id="city" class="form-control" required>
              <option value="">Seleccionar...</option>
              <option value="CABA">CABA</option>
              <option value="GBA">GBA</option>
            </select>
          </div>
          <div class="form-group">
            <label for="postalCode">Código Postal</label>
            <input type="text" id="postalCode" class="form-control" placeholder="C1001">
          </div>
        </div>
        <div class="form-group">
          <label for="phone">Teléfono *</label>
          <input type="tel" id="phone" class="form-control" placeholder="+54 11 1234-5678" required>
        </div>
      </div>

      <!-- Confirmation Code -->
      <div class="checkout-section">
        <h2>3. Código de confirmación</h2>
        <div class="form-group">
          <label for="codeType">Tipo de código *</label>
          <select id="codeType" class="form-control" required onchange="toggleCodeInput()">
            <option value="">Seleccionar...</option>
            <option value="dni">DNI</option>
            <option value="generated">Generado por el sistema</option>
          </select>
        </div>
        <div class="form-group hidden" id="dni-group">
          <label for="dniInput">DNI *</label>
          <input type="text" id="dniInput" class="form-control" placeholder="12345678">
        </div>
      </div>
    </div>

    <!-- Order Summary -->
    <div class="checkout-section" style="position: sticky; top: 80px;">
      <h2>4. Resumen del pedido</h2>
      <div id="checkout-items"></div>
      <div class="order-totals" id="checkout-totals"></div>
      <button class="btn btn-primary btn-block btn-lg mt-16" id="mp-btn" onclick="processPayment()">
        Pagar con Mercado Pago
      </button>
      <p style="font-size:12px;color:var(--text-muted);text-align:center;margin-top:12px;">
        Serás redirigido a Mercado Pago para completar el pago de forma segura.
      </p>
    </div>
  </div>
</main>

<script src="app.js"></script>
</body>
</html>
